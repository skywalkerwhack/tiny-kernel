name: Build Linux .config

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-latest
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            cpio \
            flex \
            libelf-dev \
            libssl-dev \
            dwarves

      - name: Download latest Linux kernel source
        run: |
          curl -L https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-7.0.tar.xz -o linux-7.0.tar.xz
          tar -xf linux-7.0.tar.xz
          mv linux-7.0 linux

      - name: Build bzImage from repository .config
        working-directory: linux
        run: |
          cp "${GITHUB_WORKSPACE}/.config" .config
          make olddefconfig
          make -j"$(nproc)"
          cp arch/x86/boot/bzImage "${GITHUB_WORKSPACE}/bzImage"

      - name: Build initrd from repository initramfs
        working-directory: initramfs
        run: |
          find . -print0 \
            | cpio --null --create --format=newc --owner=0:0 \
            | gzip -9 > "${GITHUB_WORKSPACE}/initrd.img"

      - name: Delete existing releases and tags
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate --jq '.[].id' | while read -r release_id; do
            [ -n "${release_id}" ] || continue
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
          done

          gh api "repos/${GITHUB_REPOSITORY}/git/matching-refs/tags" --jq '.[].ref' | while read -r tag_ref; do
            [ -n "${tag_ref}" ] || continue
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/${tag_ref}"
          done

      - name: Create fresh latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          build_date="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          gh release create latest \
            "${GITHUB_WORKSPACE}/bzImage#bzImage" \
            "${GITHUB_WORKSPACE}/initrd.img#initrd.img" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Latest Linux .config build with initrd" \
            --notes "Linux master bzImage and repository initramfs initrd built from repository .config on ${build_date}" \
            --latest

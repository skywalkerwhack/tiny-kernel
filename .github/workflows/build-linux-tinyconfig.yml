name: Build Linux .config

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-latest
  cancel-in-progress: true

env:
  KERNEL_VERSION: "7.0"

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            --no-install-recommends \
            bc \
            bison \
            build-essential \
            ccache \
            cpio \
            curl \
            flex \
            libelf-dev \
            libssl-dev \
            dwarves

      - name: Cache Linux source tarball
        uses: actions/cache@v4
        with:
          path: linux-${{ env.KERNEL_VERSION }}.tar.xz
          key: linux-tarball-${{ env.KERNEL_VERSION }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ${{ runner.os }}-ccache-${{ env.KERNEL_VERSION }}-${{ hashFiles('.config', '.github/workflows/build-linux-tinyconfig.yml') }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ env.KERNEL_VERSION }}-

      - name: Download latest Linux kernel source
        run: |
          if [ ! -f "linux-${KERNEL_VERSION}.tar.xz" ]; then
            curl -L "https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-${KERNEL_VERSION}.tar.xz" -o "linux-${KERNEL_VERSION}.tar.xz"
          fi
          tar -xf "linux-${KERNEL_VERSION}.tar.xz"
          mv "linux-${KERNEL_VERSION}" linux

      - name: Build bzImage from repository .config
        working-directory: linux
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          CC: "ccache gcc"
          HOSTCC: "ccache gcc"
        run: |
          mkdir -p "${CCACHE_DIR}"
          cp "${GITHUB_WORKSPACE}/.config" .config
          make olddefconfig
          make -j"$(nproc)" bzImage
          ccache --show-stats || true
          cp arch/x86/boot/bzImage "${GITHUB_WORKSPACE}/bzImage"

      - name: Build initrd from repository initramfs
        working-directory: initramfs
        run: |
          find . -print0 \
            | cpio --null --create --format=newc --owner=0:0 \
            | gzip -9 > "${GITHUB_WORKSPACE}/initrd.img"

      - name: Package bzImage and initrd
        run: |
          tar -C "${GITHUB_WORKSPACE}" -czf "${GITHUB_WORKSPACE}/linux-boot-artifacts.tar.gz" \
            bzImage \
            initrd.img

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release delete latest \
            --repo "${GITHUB_REPOSITORY}" \
            --yes \
            --cleanup-tag || true

      - name: Create fresh latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          build_date="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          gh release create latest \
            "${GITHUB_WORKSPACE}/linux-boot-artifacts.tar.gz#linux-boot-artifacts.tar.gz" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Latest Linux .config build with initrd" \
            --notes "Linux mainline bzImage and repository initramfs initrd packaged as linux-boot-artifacts.tar.gz on ${build_date}" \
            --latest
